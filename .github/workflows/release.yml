name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform ${{ matrix.platform }} -tags webkit2_41 -o devdeck

      - name: Build (Windows / macOS)
        if: runner.os != 'Linux'
        run: wails build -platform ${{ matrix.platform }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf devdeck-${{ github.ref_name }}-linux-amd64.tar.gz -C build/bin devdeck

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/bin/devdeck.exe -DestinationPath devdeck-${{ github.ref_name }}-windows-amd64.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent build/bin/devdeck.app devdeck-${{ github.ref_name }}-macos-universal.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: devdeck-${{ runner.os }}
          path: |
            devdeck-*.tar.gz
            devdeck-*.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
